name: Generate Extra Rulesets

on:
  schedule:
    - cron: '0 7 15 * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget jq
          
      - name: Generate rules
        run: |
          chmod +x ./scripts/generate-rules.sh
          ./scripts/generate-rules.sh
          
      - name: Verify generated files
        run: |
          for file in ruleset/proxy-ai.list ruleset/direct-game.list ruleset/direct-cdn.list; do
            if[ ! -f "$file" ]; then
              echo "Error: $file not found!"
              exit 1
            fi
          done
          
      - name: Commit and push if changed
        run: |
          if git diff --quiet --exit-code ruleset/; then
            echo "No changes detected."
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            git add ruleset/
            git commit -m "chore: update rulesets"
            git push
          fi